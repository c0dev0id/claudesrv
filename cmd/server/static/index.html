<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Coding Session</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; line-height: 1.6; }
  #header { position: sticky; top: 0; background: #161b22; border-bottom: 1px solid #30363d; padding: 10px 20px; display: flex; align-items: center; gap: 10px; z-index: 10; }
  #status-dot { width: 9px; height: 9px; border-radius: 50%; background: #3fb950; flex-shrink: 0; }
  #status-dot.offline { background: #6e7681; }
  #status-label { font-size: 13px; color: #8b949e; }
  #feed { max-width: 860px; margin: 0 auto; padding: 24px 20px 80px; }
  .entry { margin-bottom: 28px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
  .entry-user .label  { color: #58a6ff; }
  .entry-assistant .label { color: #3fb950; }
  .entry-tool { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; color: #6e7681; font-size: 13px; }
  .entry-tool .tool-name { color: #8b949e; font-weight: 600; min-width: 70px; }
  .bubble { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 18px; }
  .entry-user .bubble { border-color: #1f3d5c; }
  /* markdown styles */
  .bubble p { margin-bottom: .8em; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble code { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 1px 5px; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
  .bubble pre { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 14px; overflow-x: auto; margin: .8em 0; }
  .bubble pre code { background: none; border: none; padding: 0; }
  .bubble pre code { font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
  .bubble h1,.bubble h2,.bubble h3 { color: #e6edf3; margin: .8em 0 .4em; }
  .bubble ul,.bubble ol { padding-left: 1.4em; margin-bottom: .8em; }
  .bubble blockquote { border-left: 3px solid #30363d; padding-left: 12px; color: #8b949e; margin: .8em 0; }
  .bubble a { color: #58a6ff; }
  .bubble strong { color: #e6edf3; }
  #empty { color: #6e7681; text-align: center; padding: 60px 0; font-size: 14px; }
</style>
</head>
<body>
<div id="header">
  <div id="status-dot"></div>
  <span id="status-label">Connecting…</span>
</div>
<div id="feed">
  <div id="empty">Waiting for session data…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
<script>
  const feed = document.getElementById('feed');
  const dot  = document.getElementById('status-dot');
  const lbl  = document.getElementById('status-label');
  const empty = document.getElementById('empty');
  let count = 0;

  marked.setOptions({ breaks: true, gfm: true });

  function setStatus(online) {
    dot.className = online ? '' : 'offline';
    lbl.textContent = online ? 'Live' : 'Disconnected';
  }

  function addEntry(ev) {
    if (empty) empty.remove();
    count++;
    const div = document.createElement('div');
    div.className = 'entry';

    if (ev.kind === 'tool') {
      div.classList.add('entry-tool');
      div.innerHTML = '<span class="tool-name">' + escHtml(ev.tool_name || 'tool') + '</span>'
                    + '<span>' + escHtml(ev.text || '') + '</span>';
    } else {
      const isUser = ev.kind === 'user';
      div.classList.add(isUser ? 'entry-user' : 'entry-assistant');
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = isUser ? 'User' : 'Assistant';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (isUser) {
        bubble.textContent = ev.text || '';
      } else {
        bubble.innerHTML = marked.parse(ev.text || '');
      }
      div.appendChild(label);
      div.appendChild(bubble);
    }

    feed.appendChild(div);
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function connect() {
    const es = new EventSource('/events');
    es.onopen = () => setStatus(true);
    es.onmessage = e => {
      try { addEntry(JSON.parse(e.data)); } catch(_) {}
    };
    es.onerror = () => {
      setStatus(false);
      es.close();
      setTimeout(connect, 3000);
    };
  }

  connect();
</script>
</body>
</html>
